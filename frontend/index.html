<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointy — Найди место</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">

    <!-- ── Левая панель — чат ── -->
    <aside class="chat-panel">
      <div class="chat-header">
        <div class="chat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div>
          <h1 class="chat-title">Pointy</h1>
          <p class="chat-subtitle">Твой личный гид по городу</p>
        </div>
        <button type="button" class="burger-btn" id="burger-btn" title="История поиска">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="history-drawer" id="history-drawer">
        <div class="history-drawer-header">
          <span class="history-drawer-title">История поиска</span>
          <button type="button" class="history-close" id="history-close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">Пока пусто</div>
        </div>
      </div>

      <div class="examples">
        <span class="examples-label">Попробуй</span>
        <button type="button" class="example-btn" data-query="тихое кафе для работы">тихое кафе для работы</button>
        <button type="button" class="example-btn" data-query="поесть на Арбате">поесть на Арбате</button>
        <button type="button" class="example-btn" data-query="коворкинг на пару часов">коворкинг на пару часов</button>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input
          type="text"
          id="input"
          class="chat-input"
          placeholder="Например: тихое кафе для работы..."
          autocomplete="off"
        />
        <button type="button" class="send-btn" id="send-btn" aria-label="Отправить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </aside>

    <!-- ── Правая часть — карта ── -->
    <main class="map-area">
      <div id="map"></div>

      <div class="map-controls">
        <button type="button" class="map-ctrl-btn" id="pin-btn" title="Поставить метку — поиск рядом с этой точкой">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span id="pin-label">Поставить метку</span>
        </button>

        <div class="radius-group" id="radius-group">
          <span class="radius-label">Радиус:</span>
          <button type="button" class="radius-btn active" data-km="0.25">250 м</button>
          <button type="button" class="radius-btn" data-km="1">1 км</button>
          <button type="button" class="radius-btn" data-km="50">Вся Москва</button>
          <button type="button" class="radius-clear" id="clear-pin" title="Убрать метку">✕</button>
        </div>
      </div>
    </main>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
